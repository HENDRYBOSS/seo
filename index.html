<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DomainHub - Buy Domains</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      min-height: 100vh;
    }
    .hero-bg {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-globe text-4xl text-indigo-600"></i>
        <h1 class="text-3xl font-bold text-gray-800">DomainHub</h1>
      </div>
      <button class="bg-indigo-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-indigo-700">
        Sign In
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <div class="hero-bg text-white py-24">
    <div class="max-w-4xl mx-auto text-center px-6">
      <h2 class="text-5xl md:text-6xl font-bold mb-6">Find Your Perfect Domain</h2>
      <p class="text-2xl text-indigo-100 mb-10">Most domains just <span class="font-bold">$16/year</span></p>
      
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-3 flex flex-col md:flex-row gap-3">
          <input 
            id="domainInput"
            type="text" 
            placeholder="wildrootsjunglesafarilodge.com"
            class="flex-1 px-8 py-7 text-gray-800 text-2xl rounded-3xl focus:outline-none"
            onkeypress="if(event.key === 'Enter') checkDomain()">
          <button onclick="checkDomain()" 
                  class="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-7 rounded-3xl font-semibold text-xl flex items-center justify-center gap-3 w-full md:w-auto">
            <i class="fas fa-search"></i> Search
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="max-w-7xl mx-auto px-6 py-12 hidden">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Main Result -->
      <div id="mainResult" class="p-12 border-b">
        <!-- JS will fill -->
      </div>

      <!-- Alternatives -->
      <div class="p-12">
        <h3 class="text-3xl font-semibold mb-8">Available Alternatives – Only $16/year</h3>
        <div id="suggestions" class="grid md:grid-cols-2 gap-6">
          <!-- JS will fill -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const specialDomain = "wildrootsjunglesafarilodge.com";

    function checkDomain() {
      let input = document.getElementById('domainInput').value.trim().toLowerCase();
      
      if (!input) {
        alert("Please enter a domain name!");
        return;
      }
      if (!input.includes('.')) input += '.com';

      document.getElementById('results').classList.remove('hidden');

      const main = document.getElementById('mainResult');
      const suggestionsContainer = document.getElementById('suggestions');
      suggestionsContainer.innerHTML = '';

      if (input === specialDomain) {
        // Special case for wildrootsjunglesafarilodge.com → Not Available but shows $16
        main.innerHTML = `
          <div class="flex flex-col lg:flex-row items-center justify-between gap-10">
            <div class="flex-1">
              <div class="flex items-center gap-5 flex-wrap">
                <span class="text-4xl lg:text-5xl font-bold text-gray-900">${input}</span>
                <span class="px-8 py-3 bg-red-100 text-red-700 text-lg font-bold rounded-3xl">NOT AVAILABLE</span>
              </div>
              <p class="text-gray-600 mt-6 text-lg">This domain is currently not available for standard registration.</p>
            </div>
            <div class="text-center lg:text-right">
              <div class="text-6xl font-bold text-green-600">$16</div>
              <p class="text-gray-500">Special Price</p>
              <button onclick="makeOffer()" 
                      class="mt-8 bg-red-600 hover:bg-red-700 text-white px-14 py-5 rounded-3xl font-semibold text-xl">
                Make an Offer
              </button>
            </div>
          </div>
        `;
      } else {
        // All other domains → Normal Not Available with high premium price
        const premiumPrice = Math.floor(Math.random() * 2200) + 1499;
        main.innerHTML = `
          <div class="flex flex-col lg:flex-row items-center justify-between gap-10">
            <div class="flex-1">
              <div class="flex items-center gap-5 flex-wrap">
                <span class="text-4xl lg:text-5xl font-bold text-gray-900">${input}</span>
                <span class="px-8 py-3 bg-red-100 text-red-700 text-lg font-bold rounded-3xl">NOT AVAILABLE</span>
              </div>
              <p class="text-gray-600 mt-6 text-lg">This domain is already registered or listed as premium.</p>
            </div>
            <div class="text-center lg:text-right">
              <div class="text-6xl font-bold text-red-600">$${premiumPrice}</div>
              <p class="text-gray-500">Premium one-time price</p>
              <button onclick="makeOffer()" 
                      class="mt-8 bg-red-600 hover:bg-red-700 text-white px-14 py-5 rounded-3xl font-semibold text-xl">
                Make an Offer
              </button>
            </div>
          </div>
        `;
      }

      // Always show $16 alternatives
      const alts = [
        "wildrootsjunglesafari.com", "junglesafarilodge.com", "wildrootslodge.com",
        "junglesafarilodge.io", "wildrootsafaris.com", "nepaljunglelodge.com",
        "wildrootssafari.com", "junglesafarinp.com"
      ];

      alts.forEach(d => {
        const div = document.createElement('div');
        div.className = "bg-gray-50 hover:bg-green-50 border border-gray-200 p-8 rounded-3xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 transition";
        div.innerHTML = `
          <div>
            <div class="text-2xl font-semibold">${d}</div>
            <div class="text-green-600 mt-1">Available Now</div>
          </div>
          <div class="text-right">
            <div class="text-4xl font-bold text-green-600">$16</div>
            <div class="text-sm text-gray-500">per year</div>
            <button onclick="buyDomain('${d}')" 
                    class="mt-6 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-3xl font-semibold w-full sm:w-auto">
              Buy Now
            </button>
          </div>
        `;
        suggestionsContainer.appendChild(div);
      });
    }

    function buyDomain(domain) {
      alert(`🎉 Success!\n\nYou purchased: ${domain}\nPrice: $16/year\nThank you for choosing DomainHub!`);
    }

    function makeOffer() {
      alert("Thank you!\nOur team will contact you soon regarding this domain.");
    }
  </script>
</body>
</html>
